services:
  # ==========================================================================
  # OpenClaw Gateway — AI agent connecting to messaging platforms and MCP tools
  # Built from source: run ./docker-setup.sh to build openclaw:local first.
  # ==========================================================================
  openclaw-gateway:
    image: openclaw:local
    container_name: zarqa-openclaw-gateway
    # mcporter wraps the entrypoint and injects MCP tools (Zarqa via AXL)
    command: ["mcporter", "run", "--", "openclaw.mjs", "gateway", "--verbose"]
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${OPENCLAW_GATEWAY_PORT:-18789}:${OPENCLAW_GATEWAY_PORT:-18789}"
    volumes:
      - ./.openclaw:/home/node/.openclaw
      # Zarqa AXL bridge — stdio MCP server that routes calls through the mesh
      - ./zarqa_axl_bridge.mjs:/home/node/zarqa-bridge/zarqa_axl_bridge.mjs:ro
      # mcporter config — registers the zarqa MCP server
      - ./.mcporter:/home/node/.mcporter:ro
    environment:
      - NODE_ENV=production
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
      - ALCHEMY_API_KEY=${ALCHEMY_API_KEY:-}
      # Node A peer ID — get this by running: curl http://localhost:9002/topology | jq '.self'
      - ZARQA_NODE_A_PEER_ID=${ZARQA_NODE_A_PEER_ID:-}
    restart: unless-stopped

  # ==========================================================================
  # OpenClaw CLI — for channel setup and config after gateway is running
  # Usage: docker compose run --rm --profile cli openclaw-cli <command>
  # ==========================================================================
  openclaw-cli:
    image: openclaw:local
    container_name: zarqa-openclaw-cli
    network_mode: "service:openclaw-gateway"
    volumes:
      - ./.openclaw:/home/node/.openclaw
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_GATEWAY_TOKEN:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    entrypoint: ["openclaw.mjs"]
    profiles:
      - cli
    depends_on:
      - openclaw-gateway
